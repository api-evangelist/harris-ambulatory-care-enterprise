apis:
  - aid: harris-ambulatory-care-enterprise:pulse-fhir-api
    name: Pulse FHIR API
    description: >-
      The Pulse §170.315(g)(10) ONC Certified FHIR API enables third-party
      application developers to register, authenticate, and integrate with
      providers using Harris Pulse EHR software. The documentation describes
      registration, syntax, supported FHIR resources, and error handling.
      Because Pulse is deployed per provider, each customer hosts a separate
      API instance with its own base URL.
    humanURL: https://harrisambulatory.com/pulse-api-documentation/
