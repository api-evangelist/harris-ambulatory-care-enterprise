aid: harris-ambulatory-care-enterprise
name: Harris Ambulatory Care Enterprise
description: >-
  Harris Ambulatory Care Enterprise (part of Harris Healthcare, a Harris Computer
  company) provides ambulatory healthcare software solutions including the Pulse
  electronic health record system. The platform supports a §170.315(g)(10) ONC
  certified FHIR API for third-party application developers to access patient
  data, provider information, and clinical resources. Pulse is deployed
  on-premises, so each provider hosts a separate API instance with its own base
  URL. Third-party developers must obtain an ONC 2015 Edition Certified API
  License and register with each provider organization.
type: Index
